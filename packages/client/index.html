<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Cosmonauts — Testing Grounds</title>
    <style>
      html,
      body {
        margin: 0;
        padding: 0;
        overflow: hidden;
        background: #10142a;
      }
      canvas {
        display: block;
      }
      #hud {
        position: fixed;
        top: 8px;
        left: 8px;
        color: #9fb4ff;
        font: 12px/1.5 ui-monospace, monospace;
        pointer-events: none;
        white-space: pre;
        text-shadow: 0 1px 2px #000;
      }
      #tuning {
        position: fixed;
        top: 36px;
        right: 8px;
        color: #cfd8ff;
        font: 12px/1.6 ui-monospace, monospace;
        background: rgba(10, 14, 35, 0.85);
        border: 1px solid #2c3354;
        border-radius: 6px;
        padding: 6px 10px;
        max-height: 90vh;
        overflow-y: auto;
      }
      #version {
        position: fixed;
        top: 8px;
        right: 8px;
        color: #7df9ff;
        font: bold 11px/1 ui-monospace, monospace;
        background: rgba(10, 14, 35, 0.9);
        border: 1px solid #2c3354;
        border-radius: 4px;
        padding: 4px 8px;
        z-index: 9999;
        pointer-events: none;
      }
      #tuning summary {
        cursor: pointer;
        color: #7df9ff;
      }
      #tuning label {
        display: flex;
        justify-content: space-between;
        gap: 8px;
      }
      #tuning input {
        width: 64px;
        background: #181d3a;
        color: #cfd8ff;
        border: 1px solid #2c3354;
        border-radius: 3px;
        font: inherit;
      }
      #tuning h4 {
        margin: 6px 0 2px;
        color: #ffd166;
      }
      #editorbar {
        position: fixed;
        bottom: 8px;
        left: 8px;
        display: flex;
        gap: 6px;
        align-items: center;
        color: #cfd8ff;
        font: 12px/1.6 ui-monospace, monospace;
        background: rgba(10, 14, 35, 0.9);
        border: 1px solid #2c3354;
        border-radius: 6px;
        padding: 6px 10px;
      }
      #editorbar strong {
        color: #ff2bd6;
      }
      #editorbar button,
      #inspector button {
        background: #181d3a;
        color: #cfd8ff;
        border: 1px solid #2c3354;
        border-radius: 4px;
        font: inherit;
        cursor: pointer;
        padding: 2px 8px;
      }
      #editorbar button.active {
        border-color: #7df9ff;
        color: #7df9ff;
      }
      #editorbar select,
      #inspector select,
      #inspector input {
        background: #181d3a;
        color: #cfd8ff;
        border: 1px solid #2c3354;
        border-radius: 4px;
        font: inherit;
      }
      #editorstatus {
        color: #9fb4ff;
        opacity: 0.8;
      }
      #inspector {
        position: fixed;
        bottom: 8px;
        right: 8px;
        color: #cfd8ff;
        font: 12px/1.8 ui-monospace, monospace;
        background: rgba(10, 14, 35, 0.9);
        border: 1px solid #2c3354;
        border-radius: 6px;
        padding: 6px 10px;
        min-width: 220px;
      }
      #inspector h4 {
        margin: 0 0 4px;
        color: #7df9ff;
      }
      #inspector label {
        display: flex;
        justify-content: space-between;
        gap: 8px;
      }
    </style>
  </head>
  <body>
    <div id="hud"></div>
    <div id="version">v0.0.4</div>
    <details id="tuning" open>
      <summary>tuning</summary>
    </details>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
