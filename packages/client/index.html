<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Cosmonauts — Testing Grounds</title>
    <style>
      html,
      body {
        margin: 0;
        padding: 0;
        overflow: hidden;
        background: #10142a;
      }
      canvas {
        display: block;
      }
      #hud {
        position: fixed;
        top: 8px;
        left: 8px;
        color: #9fb4ff;
        font: 12px/1.5 ui-monospace, monospace;
        pointer-events: none;
        white-space: pre;
        text-shadow: 0 1px 2px #000;
      }
      #tuning {
        position: fixed;
        top: 8px;
        right: 8px;
        color: #cfd8ff;
        font: 12px/1.6 ui-monospace, monospace;
        background: rgba(10, 14, 35, 0.85);
        border: 1px solid #2c3354;
        border-radius: 6px;
        padding: 6px 10px;
        max-height: 90vh;
        overflow-y: auto;
      }
      #tuning summary {
        cursor: pointer;
        color: #7df9ff;
      }
      #tuning label {
        display: flex;
        justify-content: space-between;
        gap: 8px;
      }
      #tuning input {
        width: 64px;
        background: #181d3a;
        color: #cfd8ff;
        border: 1px solid #2c3354;
        border-radius: 3px;
        font: inherit;
      }
      #tuning h4 {
        margin: 6px 0 2px;
        color: #ffd166;
      }
    </style>
  </head>
  <body>
    <div id="hud"></div>
    <details id="tuning" open>
      <summary>tuning</summary>
    </details>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
